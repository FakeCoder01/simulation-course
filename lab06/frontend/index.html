<!doctype html>
<html lang="ru">
    <head>
        <meta charset="UTF-8" />
        <title>Лаб 6: имитационного моделирования</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    </head>
    <body class="bg-gray-100 p-8 font-sans">
        <div class="max-w-6xl mx-auto space-y-8">
            <h1 class="text-3xl font-bold text-center text-gray-800">
                Имитационное моделирование случайных величин
            </h1>
            <div class="mb-4 space-x-4 flex justify-center">
                <button
                    class="px-3 py-1 bg-blue-400 hover:bg-blue-500"
                    onclick="changeDisribution({
                      show:'discrete', hide:'normal', slag: 'distribution-tab'
                    })"
                >
                    Дискретный
                </button>
                <button
                    class="px-3 py-1 bg-blue-400 hover:bg-blue-500"
                    onclick="changeDisribution({
                      show:'normal', hide:'discrete', slag: 'distribution-tab'
                    })"
                >
                    Нормальный
                </button>
            </div>

            <div
                id="discrete-distribution-tab"
                class="bg-white p-6 rounded-lg shadow-md flex flex-col md:flex-row gap-8"
            >
                <div class="bg-blue-200 p-6 rounded-md shadow flex-none w-80">
                    <h2 class="text-xl font-bold mb-4">
                        Дискретное распределение
                    </h2>
                    <div class="space-y-2 mb-4" id="discrete-inputs"></div>
                    <div class="mb-4">
                        <label class="block">Количество экспериментов</label>
                        <input
                            type="number"
                            id="discrete-n"
                            value="1000"
                            class="w-full border p-1 rounded"
                        />
                    </div>
                    <button
                        onclick="runDiscrete()"
                        class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600 w-full font-bold"
                    >
                        Начинать
                    </button>
                </div>

                <div
                    class="flex-grow bg-blue-100 p-6 rounded-md flex flex-col items-center"
                >
                    <div class="w-full h-64 bg-white p-2 rounded shadow mb-4">
                        <canvas id="discreteChart"></canvas>
                    </div>
                    <div
                        class="w-full text-lg space-y-1 font-semibold"
                        id="discrete-results"
                    ></div>
                </div>
            </div>

            <div
                id="normal-distribution-tab"
                class="hidden bg-white p-6 rounded-lg shadow-md flex flex-col md:flex-row gap-8"
            >
                <div class="bg-blue-200 p-6 rounded-md shadow flex-none w-80">
                    <h2 class="text-xl font-bold mb-4">
                        Нормальное распределение
                    </h2>
                    <div class="space-y-2 mb-4">
                        <div class="flex justify-between items-center">
                            <label>Среднее значение</label>
                            <input
                                type="number"
                                id="normal-mean"
                                value="0"
                                class="w-24 border p-1 rounded"
                            />
                        </div>
                        <div class="flex justify-between items-center">
                            <label>Дисперсия</label>
                            <input
                                type="number"
                                id="normal-var"
                                value="1"
                                class="w-24 border p-1 rounded"
                            />
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="block">Размер выборки</label>
                        <input
                            type="number"
                            id="normal-n"
                            value="1000"
                            class="w-full border p-1 rounded"
                        />
                    </div>
                    <button
                        onclick="runNormal()"
                        class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600 w-full font-bold"
                    >
                        Начинать
                    </button>
                </div>

                <div
                    class="flex-grow bg-blue-100 p-6 rounded-md flex flex-col items-center"
                >
                    <div class="w-full h-64 bg-white p-2 rounded shadow mb-4">
                        <canvas id="normalChart"></canvas>
                    </div>
                    <div
                        class="w-full text-lg space-y-1 font-semibold"
                        id="normal-results"
                    ></div>
                </div>
            </div>
        </div>
        <script src="script.js"></script>
    </body>
</html>
