# lab02/docker-compose.yml — run lab2 in isolation (no gateway needed)
#
# run: (from lab02/ directory):
#   docker compose up --build
#
# access:
#   http://localhost:3001/           : SPA root
#   http://localhost:3001/lab2/      : same SPA (both paths work)
#   http://localhost:3001/lab2/api/  : API (nginx proxies to backend)

version: "3.9"

services:
  backend:
    build: ./backend
    container_name: lab2-backend
    restart: unless-stopped
    networks:
      lab2-net:
        aliases:
          - backend
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/health"]
      interval: 8s
      timeout: 5s
      retries: 5
      start_period: 5s

  frontend:
    build: ./frontend
    container_name: lab2-frontend
    restart: unless-stopped
    ports:
      - "3001:80"
    networks:
      - lab2-net
    depends_on:
      backend:
        condition: service_healthy

networks:
  lab2-net:
    name: lab2-net-standalone
