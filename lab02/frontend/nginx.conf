# two modes:
#   Via gateway  : gateway strips /lab2 before forwarding here, so this
#                  nginx only ever sees / and /api/ — no extra config needed
#   Standalone   : browser hits localhost:3001/lab2/api/..., this nginx
#                  handles the /lab2/ prefix itself

server {
    listen 80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # ── via-gateway path (gateway already stripped /lab2)
    location /api/ {
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        add_header Access-Control-Allow-Origin *;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── standalone path (browser hits :port/lab2/...)
    location /lab2/api/ {
        proxy_pass         http://backend:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        add_header Access-Control-Allow-Origin *;
    }

    location /lab2/ {
        try_files $uri $uri/ /index.html;
    }

}
