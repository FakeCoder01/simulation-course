# two modes:
#   Via gateway  : gateway strips /lab1 before forwarding here, so this
#                  nginx only ever sees / and /api/ — no extra config needed
#   Standalone   : browser hits localhost:3001/lab1/api/..., this nginx
#                  handles the /lab1/ prefix itself

server {
    listen 80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # ── via-gateway path (gateway already stripped /lab1)
    location /api/ {
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── standalone path (browser hits :port/lab1/...)
    location /lab1/api/ {
        proxy_pass         http://backend:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    location /lab1/ {
        try_files $uri $uri/ /index.html;
    }
}
