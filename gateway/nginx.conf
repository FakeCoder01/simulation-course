# single entry point: port 3000
# routes /labN/api/ : labN backend   (strips /labN prefix)
#        /labN/     : labN frontend  (strips /labN prefix)

server {
    listen 80;
    server_name _;

    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location = / {
        return 302 /lab1/;
    }

    # lab 1
    # api : lab1-backend (strips /lab1 so backend sees /api/...)
    location /lab1/api/ {
        proxy_pass http://lab1-backend:8080/api/;
    }

    # frontend : lab1-frontend (strips /lab1)
    location /lab1/ {
        proxy_pass http://lab1-frontend/;
    }

    # lab 2
    # api : lab2-backend (strips /lab2 so backend sees /api/...)
    location /lab2/api/ {
        proxy_pass http://lab2-backend:8080/api/;
    }

    # frontend : lab2-frontend (strips /lab2)
    location /lab2/ {
        proxy_pass http://lab2-frontend/;
    }

    # lab 3
    # api : lab3-backend (strips /lab3 so backend sees /api/...)
    location /lab3/api/ {
        proxy_pass http://lab3-backend:8080/api/;
    }

    location /lab3/ws {
        proxy_pass http://lab3-backend:8080/ws;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;

        proxy_read_timeout      3600s;
        proxy_send_timeout      3600s;
        proxy_connect_timeout   10s;
    }

    # frontend : lab3-frontend (strips /lab3)
    location /lab3/ {
        proxy_pass http://lab3-frontend/;
    }

}
