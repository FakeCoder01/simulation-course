# two modes:
#   Via gateway  : gateway strips /lab3 before forwarding here, so this
#                  nginx only ever sees / and /api/ - no extra config needed
#   Standalone   : browser hits localhost:3001/lab3/api/..., this nginx
#                  handles the /lab3/ prefix itself


server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass         http://backend:8080/api/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }

    location /ws {
        proxy_pass              http://backend:8080/ws;
        proxy_http_version      1.1;
        proxy_set_header        Upgrade    $http_upgrade;
        proxy_set_header        Connection "upgrade";
        proxy_set_header        Host       $host;
        proxy_read_timeout      3600s;
        proxy_send_timeout      3600s;
        proxy_connect_timeout   10s;
    }

    # ── standalone path (browser hits :port/lab3/...)
    location /lab3/api/ {
        proxy_pass         http://backend:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        add_header Access-Control-Allow-Origin *;
    }

    # ── standalone path (browser hits :port/lab3/...)
    location /lab3/ws/ {
        proxy_pass              http://backend:8080/ws;
        proxy_http_version      1.1;
        proxy_set_header        Upgrade    $http_upgrade;
        proxy_set_header        Connection "upgrade";
        proxy_set_header        Host       $host;
        proxy_read_timeout      3600s;
        proxy_send_timeout      3600s;
        proxy_connect_timeout   10s;
    }

    location /lab3/ {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/html text/css application/javascript;
}
